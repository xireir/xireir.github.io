<!DOCTYPE html>
<html lang="ru">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Заголовок изменится динамически из config.json -->
    <title>Библиотека</title>
    
    <!-- Подключаем твои существующие стили (поправь путь, если CSS лежит в другом месте) -->

</head>
<body>

    <!-- Шапка сайта (можно скопировать из index.html для одинакового вида) -->

            <a href="index.html" class="back-link">← На главную</a>
        </nav>
    </header>

    <!-- Главный контейнер, куда скрипт js/library.js будет вставлять заголовок и книги -->

        <p>Загрузка библиотеки...</p>
